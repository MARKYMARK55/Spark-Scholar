services:
  reranker:
    image: nvcr.io/nvidia/vllm:25.12.post1-py3    # ← roll back from 26.01
    container_name: bge-m3-reranker
    restart: unless-stopped
    runtime: nvidia

    command:
      - python
      - -m
      - vllm.entrypoints.openai.api_server
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --model
      - BAAI/bge-reranker-v2-m3
      - --dtype
      - auto
      - --max-model-len
      - "2048"
      - --gpu-memory-utilization
      - "0.15"
      - --served-model-name
      - bge-reranker-v2-m3
      - --api-key
      - simple-api-key
      - --no-enable-prefix-caching
      - --disable-hybrid-kv-cache-manager

    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface

    ports:
      - "8020:8000"

    environment:
      - VLLM_API_KEY=simple-api-key
      - NVIDIA_VISIBLE_DEVICES=all
      - VLLM_USE_FLASHINFER=1
      - VLLM_ATTENTION_BACKEND=FLASH_ATTN

    shm_size: 1g
    ulimits:
      memlock: -1
      stack: 67108864

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

networks:
  default:
    name: llm-net
    external: true


