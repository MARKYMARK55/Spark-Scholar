services:
  docling:
    build:
      context: .
      dockerfile: Dockerfile.simple
    image: docling-simple:latest
    container_name: docling
    restart: unless-stopped
    ports:
      - "8040:5001"
    environment:
      - CUDA_VISIBLE_DEVICES=  # Explicitly disable GPU
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - llm-net

networks:
  llm-net:
    external: true
