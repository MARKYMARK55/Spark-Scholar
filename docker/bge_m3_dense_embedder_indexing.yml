# start_bge-m3_embedder.yml
# Run BAAI/bge-m3 as OpenAI-compatible embeddings server with vLLM
# Port 8026 on host → 8000 inside container
# Designed to coexist with your Qwen3-Embedding (8025) and reranker (8020)

services:
  bge-m3-embedder:
    #image: nvcr.io/nvidia/vllm:26.01-py3   
    image: nvcr.io/nvidia/vllm:25.12-py3      # or 25.12.post1-py3   # same recent tag as your Qwen3 embedder
    container_name: bge-m3-embedder
    restart: unless-stopped
    runtime: nvidia
    ports:
      - "8026:8000"                           # different host port to avoid conflict
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
      # optional: pre-downloaded model (recommended for faster startup)
      # - /home/mark/models/bge-m3:/models/bge-m3:ro
    ipc: host
    shm_size: 4g                              # bge-m3 likes a bit more shared memory
    environment:
      - VLLM_USE_FLASHINFER=1
      - VLLM_ATTENTION_BACKEND=FLASH_ATTN
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - NVIDIA_VISIBLE_DEVICES=all
      - VLLM_API_KEY=simple-api-key
    command:
      - vllm
      - serve
      - "BAAI/bge-m3"
      - "--dtype"
      - "auto"
      - "--max-model-len"
      - "4096"                                # ← changed from 8192 (or try 2048)
      - "--gpu-memory-utilization"
      - "0.50"
      - "--max-num-seqs"
      - "8"
      - "--max-num-batched-tokens"
      - "4096"                                # now >= max_model_len → no error
      - "--enable-prefix-caching"
      - "--trust-remote-code"
      - "--served-model-name"
      - "bge-m3-embedder-indexing"
      - "--api-key"
      - "simple-api-key"
      - "--disable-log-requests"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - llm-net

networks:
  llm-net:
    external: true
    name: llm-net