services:
  bge-m3-sparse-embedder:
    container_name: bge-m3-sparse-embedder
    build:
      context: ./bge_m3_sparse_embedder
      dockerfile: Dockerfile
    restart: unless-stopped
    runtime: nvidia
    ports:
      - "8035:8001"
    environment:
      - BGE_M3_MODEL=BAAI/bge-m3
      - BGE_M3_DEVICE=cuda:0               # ← force specific GPU
      - CUDA_VISIBLE_DEVICES=0             # ← hide other GPUs
      - PYTHONUNBUFFERED=1
      - FORCE_FP16=1                       # optional hint — depends on your app
    volumes:
      - ~/.cache/huggingface:/opt/hf_home
    shm_size: 8g                           # increased a bit
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8001/health').read()",
        ]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - llm-net
networks:
  llm-net:
    name: llm-net
    external: true