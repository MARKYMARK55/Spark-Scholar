# docker-compose.yml
# ===================
# Full arXiv RAG stack for DGX Spark.
#
# Profiles
# --------
#   qdrant       — Qdrant vector database
#   embedding    — BGE-M3 dense + sparse embedders + reranker
#   core         — LiteLLM, Open WebUI, Langflow, SearXNG, Redis
#   rag-proxy    — FastAPI RAG proxy (port 8002)
#   langfuse     — Langfuse observability (port 3000) + postgres
#
# Start everything:
#   docker compose --profile qdrant --profile embedding --profile core \
#                  --profile rag-proxy --profile langfuse up -d
#
# Start just the core stack (assumes Qdrant + embedders already running):
#   docker compose --profile core --profile rag-proxy up -d
#
# Network
# -------
# All services share the external "llm-net" network.
# Create it once with: docker network create llm-net
#
# Volumes
# -------
# Persistent data is stored in named Docker volumes.
# To wipe everything: docker compose down -v

version: "3.8"

networks:
  llm-net:
    external: true
    name: llm-net

# ---------------------------------------------------------------------------
# Shared volume definitions
# ---------------------------------------------------------------------------
volumes:
  qdrant_storage:
  qdrant_snapshots:
  litellm_db:
  langfuse_db:
  redis_data:
  openwebui_data:
  langflow_data:
  searxng_data:

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------
services:

  # ==========================================================================
  # Profile: qdrant
  # ==========================================================================

  qdrant:
    profiles: [qdrant]
    image: qdrant/qdrant:v1.9.3
    container_name: qdrant
    restart: unless-stopped
    networks:
      - llm-net
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
      - qdrant_snapshots:/qdrant/snapshots
      - ../config/qdrant.yaml:/qdrant/config/production.yaml:ro
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__LOG_LEVEL: INFO
      # Uncomment to enable API key auth:
      # QDRANT__SERVICE__API_KEY: "${QDRANT_API_KEY}"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 32g

  # ==========================================================================
  # Profile: embedding
  # ==========================================================================

  bge-m3-dense-embedder:
    profiles: [embedding]
    image: vllm/vllm-openai:v0.5.0
    container_name: bge-m3-dense-embedder
    restart: unless-stopped
    networks:
      - llm-net
    ports:
      - "8025:8025"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    env_file:
      - ../.env
    environment:
      VLLM_WORKER_MULTIPROC_METHOD: spawn
    command: >
      --model BAAI/bge-m3
      --served-model-name bge-m3-embedder
      --task embedding
      --port 8025
      --api-key simple-api-key
      --dtype float16
      --max-model-len 8192
      --gpu-memory-utilization 0.25
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          memory: 16g
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8025/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

  bge-m3-sparse-embedder:
    profiles: [embedding]
    build:
      context: ../sparse_embedder
      dockerfile: Dockerfile
      args:
        HF_TOKEN: "${HF_TOKEN:-}"
    image: bge-m3-sparse-embedder:latest
    container_name: bge-m3-sparse-embedder
    restart: unless-stopped
    networks:
      - llm-net
    ports:
      - "8035:8035"
    volumes:
      - ~/.cache/huggingface:/app/.hf_cache
    env_file:
      - ../.env
    environment:
      SPARSE_MODEL: "BAAI/bge-m3"
      SPARSE_BATCH_SIZE: "32"
      SPARSE_MAX_LENGTH: "512"
      SPARSE_EMBED_PORT: "8035"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          memory: 16g
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8035/health || exit 1"]
      interval: 30s
      timeout: 20s
      retries: 10
      start_period: 120s

  bge-m3-reranker:
    profiles: [embedding]
    image: vllm/vllm-openai:v0.5.0
    container_name: bge-m3-reranker
    restart: unless-stopped
    networks:
      - llm-net
    ports:
      - "8020:8020"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    env_file:
      - ../.env
    command: >
      --model BAAI/bge-reranker-v2-m3
      --served-model-name bge-reranker-v2-m3
      --task score
      --port 8020
      --api-key simple-api-key
      --dtype float16
      --max-model-len 8192
      --gpu-memory-utilization 0.2
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          memory: 16g
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8020/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

  # ==========================================================================
  # Profile: core
  # ==========================================================================

  redis:
    profiles: [core]
    image: redis:7.2-alpine
    container_name: redis
    restart: unless-stopped
    networks:
      - llm-net
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  litellm-db:
    profiles: [core]
    image: postgres:16-alpine
    container_name: litellm-db
    restart: unless-stopped
    networks:
      - llm-net
    volumes:
      - litellm_db:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: litellm_pass
      POSTGRES_DB: litellm
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm"]
      interval: 10s
      timeout: 5s
      retries: 5

  litellm:
    profiles: [core]
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    restart: unless-stopped
    networks:
      - llm-net
    ports:
      - "4000:4000"
    volumes:
      - ../config/litellm_config.yaml:/app/config.yaml:ro
    env_file:
      - ../.env
    environment:
      LITELLM_MASTER_KEY: "${LITELLM_MASTER_KEY:-sk-change-me}"
      LITELLM_DATABASE_URL: "postgresql://litellm:litellm_pass@litellm-db:5432/litellm"
      VLLM_URL: "http://vllm:8000"
      BGE_M3_DENSE_URL: "http://bge-m3-dense-embedder:8025"
      BGE_RERANKER_URL: "http://bge-m3-reranker:8020"
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "4"]
    depends_on:
      litellm-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s

  openwebui:
    profiles: [core]
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    restart: unless-stopped
    networks:
      - llm-net
    ports:
      - "8080:8080"
    volumes:
      - openwebui_data:/app/backend/data
    env_file:
      - ../.env
    environment:
      OPENAI_API_BASE_URL: "http://litellm:4000/v1"
      OPENAI_API_KEY: "${LITELLM_API_KEY:-simple-api-key}"
      WEBUI_SECRET_KEY: "${LITELLM_MASTER_KEY:-change-me}"
      # Disable Ollama (we're using LiteLLM instead)
      ENABLE_OLLAMA_API: "false"
      # RAG proxy as additional OpenAI endpoint
      # (Set in Admin > Connections > OpenAI > Add Connection)
      ENABLE_OPENAI_API: "true"
    depends_on:
      litellm:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s

  searxng:
    profiles: [core]
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    networks:
      - llm-net
    ports:
      - "8888:8080"
    volumes:
      - searxng_data:/etc/searxng
    environment:
      SEARXNG_SECRET: "${LITELLM_MASTER_KEY:-change-me-searxng-secret}"
      SEARXNG_BIND_ADDRESS: "0.0.0.0:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  langflow:
    profiles: [core]
    image: langflowai/langflow:latest
    container_name: langflow
    restart: unless-stopped
    networks:
      - llm-net
    ports:
      - "7860:7860"
    volumes:
      - langflow_data:/app/langflow
    env_file:
      - ../.env
    environment:
      LANGFLOW_HOST: "0.0.0.0"
      LANGFLOW_PORT: "7860"
      OPENAI_API_KEY: "${LITELLM_API_KEY:-simple-api-key}"
      OPENAI_API_BASE: "http://litellm:4000/v1"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7860/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ==========================================================================
  # Profile: rag-proxy
  # ==========================================================================

  rag-proxy:
    profiles: [rag-proxy]
    build:
      context: ..
      dockerfile: api/Dockerfile
    image: arxiv-rag-proxy:latest
    container_name: rag-proxy
    restart: unless-stopped
    networks:
      - llm-net
    ports:
      - "${RAG_PROXY_PORT:-8002}:8002"
    env_file:
      - ../.env
    environment:
      QDRANT_URL: "http://qdrant:6333"
      BGE_M3_DENSE_URL: "http://bge-m3-dense-embedder:8025"
      BGE_M3_SPARSE_URL: "http://bge-m3-sparse-embedder:8035"
      BGE_RERANKER_URL: "http://bge-m3-reranker:8020"
      LITELLM_URL: "http://litellm:4000"
      REDIS_URL: "redis://redis:6379"
      SEARXNG_URL: "http://searxng:8080"
      RAG_PROXY_HOST: "0.0.0.0"
      RAG_PROXY_PORT: "8002"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8002/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ==========================================================================
  # Profile: langfuse
  # ==========================================================================

  langfuse-db:
    profiles: [langfuse]
    image: postgres:16-alpine
    container_name: langfuse-db
    restart: unless-stopped
    networks:
      - llm-net
    volumes:
      - langfuse_db:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse_pass
      POSTGRES_DB: langfuse
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5

  langfuse:
    profiles: [langfuse]
    image: ghcr.io/langfuse/langfuse:latest
    container_name: langfuse
    restart: unless-stopped
    networks:
      - llm-net
    ports:
      - "3000:3000"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: "postgresql://langfuse:langfuse_pass@langfuse-db:5432/langfuse"
      NEXTAUTH_URL: "http://localhost:3000"
      NEXTAUTH_SECRET: "${LITELLM_MASTER_KEY:-change-me-langfuse}"
      SALT: "${LITELLM_MASTER_KEY:-change-me-langfuse-salt}"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
      PORT: "3000"
    depends_on:
      langfuse-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/public/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
