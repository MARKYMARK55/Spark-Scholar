# docker/rag_proxy.yml
# =====================
# ArXiv RAG Proxy — OpenAI-compatible FastAPI proxy.
#
# Exposes POST /v1/chat/completions that runs the full hybrid RAG pipeline:
#   1. Encode query → BGE-M3 dense + sparse
#   2. Qdrant hybrid search (Prefetch + FusionQuery RRF) across routed collections
#   3. BGE-M3 cross-encoder reranking of top-50 candidates
#   4. Context injection into LiteLLM chat completion
#   5. Response with [ArXiv:XXXX.XXXXX] inline citations
#
# Use this as an additional OpenAI connection in Open WebUI (Admin > Connections).
# Point Open WebUI at http://localhost:8002 instead of LiteLLM for RAG-augmented chat.
#
# Prerequisites
# -------------
# All embedding services + Qdrant + Redis + LiteLLM must be running first.
# The image is built from api/Dockerfile in the repo root.
#
# Build + start
# -------------
#   docker compose -f docker/rag_proxy.yml build
#   docker compose -f docker/rag_proxy.yml up -d
#
# Test
# ----
#   curl http://localhost:8002/health
#   curl http://localhost:8002/v1/models
#   curl -X POST http://localhost:8002/v1/chat/completions \
#     -H "Authorization: Bearer simple-api-key" \
#     -H "Content-Type: application/json" \
#     -d '{"model": "arxiv-rag", "messages": [{"role": "user", "content": "What is RLHF?"}]}'

name: arxiv-rag-proxy

networks:
  llm-net:
    external: true
    name: llm-net

services:

  rag-proxy:
    build:
      context: ..
      dockerfile: api/Dockerfile
    image: arxiv-rag-proxy:latest
    container_name: rag-proxy
    restart: unless-stopped
    networks:
      - llm-net
    ports:
      - "${RAG_PROXY_PORT:-8002}:8002"
    env_file:
      - ../env/.env
    environment:
      # Service URLs use Docker service names (internal llm-net hostnames)
      QDRANT_URL: "http://qdrant:6333"
      QDRANT_API_KEY: "simple-api-key"
      BGE_M3_DENSE_URL: "http://bge-m3-dense-embedder:8025"
      BGE_M3_SPARSE_URL: "http://bge-m3-sparse-embedder:8035"
      BGE_RERANKER_URL: "http://bge-m3-reranker:8020"
      BGE_M3_API_KEY: "simple-api-key"
      LITELLM_BASE_URL: "http://litellm:4000"
      LITELLM_API_KEY: "simple-api-key"
      REDIS_URL: "redis://redis:6379"      # Valkey is Redis-protocol compatible
      SEARXNG_URL: "http://searxng:8080"
      RAG_PROXY_HOST: "0.0.0.0"
      RAG_PROXY_PORT: "8002"
      RAG_TOP_K: "${RAG_TOP_K:-10}"
      RAG_RERANK_TOP_N: "${RAG_RERANK_TOP_N:-50}"
      CACHE_TTL_SECONDS: "${CACHE_TTL_SECONDS:-86400}"  # 24 hours — single-user setup
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8002/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 4g
