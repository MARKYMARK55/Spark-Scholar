# start_core_services.yml
# Core infrastructure: LiteLLM proxy, Pipelines, Open WebUI
# Each service loads its own .env explicitly – no fallbacks, no missing files

name: core-infra

networks:
  llm-net:
    name: llm-net
    driver: bridge

volumes:
  litellm-db:

services:

  # ── LiteLLM Postgres DB (required for LiteLLM Admin UI) ─────────────────────
  litellm-db:
    image: postgres:16
    container_name: litellm-db
    restart: always
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: litellm
    volumes:
      - litellm-db:/var/lib/postgresql/data
    networks:
      - llm-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── LiteLLM Proxy ────────────────────────────────────────────────────────────
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    restart: always
    ports:
      - "4000:4000"
    volumes:
      - ./litellm_config.yaml:/app/config.yaml:ro
      - /home/mark/vllm/openWebUI_tools:/app/backend/functions
    command: --config /app/config.yaml --detailed_debug --num_workers 4
    environment:
      LITELLM_MASTER_KEY: "simple-api-key"
      DATABASE_URL: "postgresql://litellm:litellm@litellm-db:5432/litellm"
    networks:
      - llm-net
    env_file:
      - ../env/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      litellm-db:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ── Pipelines ────────────────────────────────────────────────────────────────
  pipelines:
    image: pipeline-deps:latest
    container_name: pipelines
    restart: always
    entrypoint: ["python", "-m", "uvicorn", "multi_mode_pipeline:app", "--host", "0.0.0.0", "--port", "9099", "--reload"]
    ports:
      - "9099:9099"
    volumes:
      - /home/mark/vllm/model_stack/pipelines:/app/pipelines
    env_file:
      - ../env/.env
    environment:
      DEBUG: "true"
      LOG_LEVEL: "DEBUG"
      PIPELINES_MODE: "full"
      PIPELINES_URLS: ""
      PIPELINES_DIR: "/app/pipelines"
      GLOBAL_LOG_LEVEL: "DEBUG"
      PYTHONPATH: "/app/pipelines"
      RESET_PIPELINES_DIR: "false"
      PIPELINES_REQUIREMENTS_PATH: ""
      NVIDIA_VISIBLE_DEVICES: "all"
      PIPELINES_API_KEY: "simple-api-key"
    networks:
      - llm-net
    shm_size: 8g
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
        limits:
          cpus: "8.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9099/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Open WebUI ───────────────────────────────────────────────────────────────
  openwebui:
    image: ghcr.io/open-webui/open-webui:cuda
    container_name: openwebui
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - /home/mark/openWebUI:/app/backend/data
      - /home/mark/.cache/huggingface:/root/.cache/huggingface
      - /home/mark/vllm/model_stack/RAG/shared-sandbox:/app/shared-sandbox
    env_file:
      - ../env/.env
    environment:
      OPENAI_API_BASE_URL: "http://litellm:4000/v1"
      OPENAI_API_KEY: simple-api-key
      LITELLM_LOG: DEBUG
      # ── Web Search ───────────────────────────────────────────────
      # Feature ON so globe icon works, auto-trigger OFF
      ENABLE_WEB_SEARCH: "true"
      ENABLE_SEARCH_QUERY_GENERATION: "false"
      WEB_SEARCH_ENGINE: "searxng"
      SEARXNG_URL: "http://searxng:8888"
      WEB_SEARCH_RESULT_COUNT: "20"
      WEB_SEARCH_CONCURRENT_REQUESTS: "5"
      BYPASS_WEB_SEARCH_EMBEDDING_AND_RETRIEVAL: "true"
      # ── Vector DB ────────────────────────────────────────────────
      VECTOR_DB: "qdrant"
      QDRANT_URI: "http://qdrant:6333"
      QDRANT_API_KEY: simple-api-key
    networks:
      - llm-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      - litellm

  # ── Langflow ─────────────────────────────────────────────────────────────────
  langflow:
    image: langflowai/langflow:latest
    container_name: langflow
    restart: always
    ports:
      - "7860:7860"
    volumes:
      - /home/mark/vllm/model_stack/langflow/data:/app/data
      - /home/mark/vllm/model_stack/langflow/components:/app/custom_components
    environment:
      LANGFLOW_HOST: "0.0.0.0"
      LANGFLOW_PORT: "7860"
      LANGFLOW_WORKERS: "2"
      LANGFLOW_COMPONENTS_PATH: "/app/custom_components"
      OPENAI_API_BASE: "http://litellm:4000/v1"
      OPENAI_API_KEY: "simple-api-key"
    command: >
      langflow run
      --host 0.0.0.0
      --port 7860
      --components-path /app/custom_components
    networks:
      - llm-net
    depends_on:
      - litellm