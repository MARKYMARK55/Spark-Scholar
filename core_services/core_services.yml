# core_services/core_services.yml
# =================================
# Core services: LiteLLM (local) + LiteLLM (cloud) + Open WebUI + Langflow.
# Redis, SearXNG, and Langfuse have their own YML files in this directory.
#
# ── LiteLLM local models (SparkRun + BGE-M3) on port 4000 ───────────────────
# Config: core_services/litellm_local.yaml
# Cloud models: add via LiteLLM admin UI (http://localhost:4000/ui) or mount
#               litellm_cloud.yaml instead — see core_services/litellm_cloud.yaml
#
# Open WebUI connections (add manually after first start):
#   Admin → Settings → Connections:
#   ① http://litellm:4000   — local SparkRun models (primary, pre-configured)
#   ② http://rag-proxy:8002 — Spark Scholar RAG-augmented (add separately)
#
# Qdrant is used for Open WebUI document uploads (built-in RAG / Path A).
# Our Arxiv collections are searched separately via the RAG proxy (Path B).
#
# Prerequisites
# -------------
# - llm-net Docker network:  docker network create llm-net
# - env/.env configured (see env/README.md)
# - SparkRun running the inference model:  github.com/scitrera/oss-spark-run
#
# Usage
# -----
#   docker compose -f core_services/core_services.yml up -d
#   docker compose -f core_services/core_services.yml logs -f litellm
#   docker compose -f core_services/core_services.yml logs -f litellm-cloud
#
# Port map
# --------
#   LiteLLM    → 4000
#   Open WebUI → 8080
#   Langflow   → 7860

name: spark-scholar-core

networks:
  llm-net:
    external: true
    name: llm-net

volumes:
  litellm_db:
    name: spark_scholar_litellm_db
  openwebui_data:
    name: spark_scholar_openwebui_data
  langflow_data:
    name: spark_scholar_langflow_data

services:

  # ── LiteLLM Postgres (shared between both LiteLLM instances) ─────────────
  litellm-db:
    image: postgres:16-alpine
    container_name: litellm-db
    restart: unless-stopped
    networks:
      - llm-net
    volumes:
      - litellm_db:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: litellm_pass
      POSTGRES_DB: litellm
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1g

  # ── LiteLLM Local — SparkRun + BGE-M3 models (port 4000) ─────────────────
  # Serves: local-model, vllm, bge-m3-embedder, bge-reranker-v2-m3
  # Config: core_services/litellm_local.yaml
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    restart: unless-stopped
    networks:
      - llm-net
    ports:
      - "4000:4000"
    volumes:
      - ./litellm_local.yaml:/app/config.yaml:ro
    env_file:
      - ../env/.env
    environment:
      LITELLM_MASTER_KEY: "simple-api-key"
      LITELLM_DATABASE_URL: "postgresql://litellm:litellm_pass@litellm-db:5432/litellm"
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "4"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      litellm-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4g


  # ── Open WebUI ─────────────────────────────────────────────────────────────
  # Primary UI. Pre-configured for:
  #   - LiteLLM local (port 4000) as primary OpenAI endpoint
  #   - Qdrant as vector DB for document uploads (Path A built-in RAG)
  #   - BGE-M3 via LiteLLM for document embedding
  #   - SearXNG for web search
  #
  # After startup, manually add these extra connections in the UI:
  #   Admin → Settings → Connections → + Add Connection:
  #     Name: "Cloud Models"   URL: http://litellm-cloud:4001/v1  Key: simple-api-key
  #     Name: "Spark Scholar"      URL: http://rag-proxy:8002/v1      Key: simple-api-key
  openwebui:
    image: ghcr.io/open-webui/open-webui:cuda
    container_name: openwebui
    restart: unless-stopped
    networks:
      - llm-net
    ports:
      - "8080:8080"
    volumes:
      - openwebui_data:/app/backend/data
      - ~/.cache/huggingface:/root/.cache/huggingface:ro
    env_file:
      - ../env/.env
    environment:
      # ── Primary LLM backend: LiteLLM local ────────────────────────────────
      OPENAI_API_BASE_URL: "http://litellm:4000/v1"
      OPENAI_API_KEY: "simple-api-key"
      WEBUI_SECRET_KEY: "simple-api-key"
      ENABLE_OLLAMA_API: "false"
      ENABLE_OPENAI_API: "true"

      # ── Qdrant vector DB for document uploads (Path A built-in RAG) ───────
      # Open WebUI manages its own collections in Qdrant (prefix: openwebui_)
      # These are separate from the Arxiv/docs collections.
      # For full RAG with Arxiv index → use Path B (rag-proxy connection).
      VECTOR_DB: "qdrant"
      QDRANT_URI: "http://qdrant:6333"
      QDRANT_API_KEY: "simple-api-key"
      QDRANT_COLLECTION_NAME_PREFIX: "openwebui"   # keeps OW collections separate

      # ── Embedding + reranking via LiteLLM local ───────────────────────────
      RAG_EMBEDDING_ENGINE: "openai"
      RAG_EMBEDDING_MODEL: "bge-m3-embedder"
      OPENAI_API_BASE_URL_FOR_RAG: "http://litellm:4000/v1"
      RAG_RERANKING_MODEL: "bge-reranker-v2-m3"

      # ── Chunking (for document uploads) ───────────────────────────────────
      CHUNK_SIZE: "1500"
      CHUNK_OVERLAP: "200"

      # ── Web search via SearXNG ─────────────────────────────────────────────
      ENABLE_WEB_SEARCH: "true"
      ENABLE_SEARCH_QUERY_GENERATION: "false"
      WEB_SEARCH_ENGINE: "searxng"
      SEARXNG_URL: "http://searxng:8080"
      WEB_SEARCH_RESULT_COUNT: "20"
      WEB_SEARCH_CONCURRENT_REQUESTS: "5"
      BYPASS_WEB_SEARCH_EMBEDDING_AND_RETRIEVAL: "true"

      # ── UI / Auth ──────────────────────────────────────────────────────────
      WEBUI_NAME: "DGX Spark"
      ENABLE_SIGNUP: "false"
      DEFAULT_LOCALE: "en-GB"

    depends_on:
      litellm:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
        limits:
          memory: 8g

  # ── Langflow ─────────────────────────────────────────────────────────────
  # Visual pipeline builder. Points at LiteLLM local by default.
  # For cloud models, update OPENAI_API_BASE to http://litellm-cloud:4001/v1.
  langflow:
    image: langflowai/langflow:latest
    container_name: langflow
    restart: unless-stopped
    networks:
      - llm-net
    ports:
      - "7860:7860"
    volumes:
      - langflow_data:/app/langflow
    env_file:
      - ../env/.env
    environment:
      LANGFLOW_HOST: "0.0.0.0"
      LANGFLOW_PORT: "7860"
      LANGFLOW_WORKERS: "2"
      OPENAI_API_KEY: "simple-api-key"
      OPENAI_API_BASE: "http://litellm:4000/v1"
    command: >
      langflow run
      --host 0.0.0.0
      --port 7860
    depends_on:
      litellm:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7860/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 4g
