# core_services/litellm_local.yaml
# =================================
# LiteLLM config — LOCAL SparkRun models only.
# Port 4000  →  Open WebUI "Local Models" connection, RAG proxy.
#
# Models here: vLLM inference (SparkRun), BGE-M3 embedder, BGE reranker.
# No cloud API keys required — works fully offline.
#
# Start with:  docker compose -f core_services/core_services.yml up -d litellm
# Logs:        docker compose -f core_services/core_services.yml logs -f litellm
#
# ── SparkRun ↔ LiteLLM Auto-Config (NEW) ────────────────────────────────────
# SparkRun now includes built-in LiteLLM proxy integration that automatically
# configures LiteLLM with whichever model SparkRun is currently running —
# including model aliases, dynamic config updates, and fallback chains.
#
# This means you may not need to edit this file at all when switching models.
# SparkRun detects the running model and registers it in LiteLLM automatically.
#
# For manual dynamic registration (without restarting LiteLLM), use:
#   source scripts/litellm_register.sh
#   litellm_register nemotron        # registers all Nemotron-* aliases
#   litellm_register qwen3-80b       # registers Qwen3-80B-* aliases
#   litellm_deregister nemotron      # removes them cleanly
#
# See scripts/litellm_register.sh for all supported model groups.
# ─────────────────────────────────────────────────────────────────────────────

general_settings:
  master_key: "os.environ/LITELLM_MASTER_KEY"
  database_url: "os.environ/LITELLM_DATABASE_URL"
  store_model_in_db: true
  allow_requests_on_db_unavailable: true

model_list:

  # ── Primary LLM: SparkRun vLLM (port 8000) ───────────────────────────────
  # SparkRun manages this. Set VLLM_MODEL_NAME to match what you loaded.
  # github.com/scitrera/oss-spark-run
  - model_name: local-model
    litellm_params:
      model: "openai/local-model"
      api_base: "os.environ/VLLM_URL"
      api_key:  "os.environ/VLLM_API_KEY"
      stream_timeout: 300
      timeout: 300
    model_info:
      description: "Primary LLM served by SparkRun vLLM (Qwen3, Nemotron-H, etc.)"

  - model_name: vllm                        # alias
    litellm_params:
      model: "openai/local-model"
      api_base: "os.environ/VLLM_URL"
      api_key:  "os.environ/VLLM_API_KEY"

  # ── Secondary LLM: Phi Mini — fast/light model (SparkRun, port 8000) ────────
  #
  # Microsoft Phi-4-mini (3.8B) or Phi-3.5-mini (3.8B) — tiny but surprisingly
  # capable, especially for structured output, classification, and code tasks.
  #
  # WHY add a second small model?
  #   Your DGX Spark has 128 GB unified memory. The primary LLM (Qwen3-30B-A3B,
  #   Nemotron-56B, etc.) typically uses 40–80 GB. When VRAM headroom allows,
  #   SparkRun can serve a second lightweight model simultaneously on a separate
  #   port (e.g. 8001). Phi Mini fits in ~4–8 GB — well within the margin.
  #
  # WHEN to use Phi Mini instead of the primary model:
  #   • Query classification / routing        (is this query about ML or biology?)
  #   • Short summarisation of retrieved chunks before reranking
  #   • Function-calling / tool-use (Phi 4 Mini is fine-tuned for this)
  #   • Fast autocomplete / code completion in Langflow prototypes
  #   • Answering simple factual questions where a 30B+ model is overkill
  #   • When the primary model is under load and you need parallel capacity
  #
  # HOW to load it with SparkRun:
  #   sparkrun search phi            # find the recipe slug first
  #   sparkrun run <phi-recipe> -o port=8001
  #   (override port with -o port=8001, any recipe flag can be overridden this way)
  #
  # The VLLM_PHI_URL env var defaults to host.docker.internal:8001.
  # Add it to env/.env if you use a non-standard port.
  #
  # Comment out or remove this block if you are not running Phi Mini.
  - model_name: phi-mini
    litellm_params:
      model: "openai/phi-mini"
      api_base: "os.environ/VLLM_PHI_URL"
      api_key:  "os.environ/VLLM_API_KEY"
      stream_timeout: 120
      timeout: 120
    model_info:
      description: "Phi-4-mini (3.8B) served by SparkRun — fast, low-VRAM secondary model"

  - model_name: phi                          # short alias
    litellm_params:
      model: "openai/phi-mini"
      api_base: "os.environ/VLLM_PHI_URL"
      api_key:  "os.environ/VLLM_API_KEY"

  # ── Named presets for the primary model ──────────────────────────────────
  # These give the same underlying model different personalities / budgets.
  # Useful in Open WebUI for quick switching — pick "Nemotron-Code" for dev,
  # "Nemotron-Max" for deep research, "Nemotron-Fast" for quick answers.
  #
  # HOW: These all point to VLLM_URL (port 8000). The model name passed to vLLM
  # must match what SparkRun loaded. Thinking budget parameters are forwarded
  # as extra_body and honoured by Nemotron / Qwen3 thinking models.
  # If your model doesn't support thinking_budget, remove those lines.
  #
  # For dynamic registration without restart, use:
  #   source scripts/litellm_register.sh && litellm_register nemotron
  #
  - model_name: Fast
    litellm_params:
      model: "openai/local-model"
      api_base: "os.environ/VLLM_URL"
      api_key:  "os.environ/VLLM_API_KEY"
      temperature: 0.55
      top_p: 0.98
      max_tokens: 32768
      stream_timeout: 120
      timeout: 120
    model_info:
      description: "Primary model — fast, low thinking budget, conversational"

  - model_name: Expert
    litellm_params:
      model: "openai/local-model"
      api_base: "os.environ/VLLM_URL"
      api_key:  "os.environ/VLLM_API_KEY"
      temperature: 0.55
      top_p: 0.98
      max_tokens: 32768
      thinking_budget: 4096
      stream_timeout: 400
      timeout: 400
    model_info:
      description: "Primary model — extended thinking (4K budget), research tasks"

  - model_name: Heavy
    litellm_params:
      model: "openai/local-model"
      api_base: "os.environ/VLLM_URL"
      api_key:  "os.environ/VLLM_API_KEY"
      temperature: 0.55
      top_p: 0.98
      max_tokens: 32768
      thinking_budget: 16384
      stream_timeout: 600
      timeout: 600
    model_info:
      description: "Primary model — deep thinking (16K budget), complex reasoning"

  - model_name: Max
    litellm_params:
      model: "openai/local-model"
      api_base: "os.environ/VLLM_URL"
      api_key:  "os.environ/VLLM_API_KEY"
      temperature: 0.55
      top_p: 0.98
      max_tokens: 32768
      thinking_budget: 32768
      stream_timeout: 600
      timeout: 600
    model_info:
      description: "Primary model — maximum thinking budget, hardest problems"

  - model_name: Code
    litellm_params:
      model: "openai/local-model"
      api_base: "os.environ/VLLM_URL"
      api_key:  "os.environ/VLLM_API_KEY"
      temperature: 0.10
      top_p: 0.95
      max_tokens: 16384
      thinking_budget: 4096
      stream_timeout: 300
      timeout: 300
    model_info:
      description: "Primary model — low temperature, code generation and debugging"

  - model_name: Creative
    litellm_params:
      model: "openai/local-model"
      api_base: "os.environ/VLLM_URL"
      api_key:  "os.environ/VLLM_API_KEY"
      temperature: 0.85
      top_p: 0.98
      max_tokens: 32768
      thinking_budget: 2048
      stream_timeout: 400
      timeout: 400
    model_info:
      description: "Primary model — high temperature, writing and brainstorming"

  # ── BGE-M3 Dense Embedder (vLLM, port 8025) ──────────────────────────────
  - model_name: bge-m3-embedder
    litellm_params:
      model: "openai/bge-m3-embedder"
      api_base: "os.environ/BGE_M3_DENSE_URL"
      api_key:  "os.environ/BGE_M3_API_KEY"
    model_info:
      mode: embedding
      description: "BGE-M3 dense embedder via vLLM — 1024-dim, port 8025"

  # ── BGE-M3 Cross-Encoder Reranker (vLLM, port 8020) ──────────────────────
  - model_name: bge-reranker-v2-m3
    litellm_params:
      model: "openai/bge-reranker-v2-m3"
      api_base: "os.environ/BGE_RERANKER_URL"
      api_key:  "os.environ/BGE_M3_API_KEY"
    model_info:
      mode: rerank
      description: "BGE-M3 cross-encoder reranker via vLLM — port 8020"

router_settings:
  num_retries: 3
  retry_after: 5
  routing_strategy: "simple-shuffle"
  request_timeout: 300
  cache_responses: false        # RAG proxy handles caching in Redis

litellm_settings:
  drop_params: true
  set_verbose: false
  json_logs: true
  log_level: "INFO"
